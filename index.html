.tabs button.on{background:#151520;border-bottom-color:#f0c040;color:#f0c040}

.cho.on{background:#f0c040;color:#08080f;font-weight:700}
.card{background:#101018;border-radius:10px;padding:12px;border:1px solid #151520;display:flex;gap:12px}
.poster{border-radius:6px;overflow:hidden;background:#1a1a28;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex-shrink:0}
.poster img{width:100%;height:100%;object-fit:cover;transition:filter .2s}
.poster.w img{filter:brightness(.4)}
.poster .ck{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3)}
.tag{font-size:9px;padding:1px 5px;border-radius:3px;background:#14141e;color:#666;border:1px solid #1e1e2a}
.ptag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap;flex-shrink:0}
.stars span{transition:color .15s;user-select:none;cursor:pointer}
.btn-w{border-radius:5px;padding:3px 8px;cursor:pointer;font-size:10px;font-weight:600}
.grid-card{width:calc(33.33% - 6px);flex-shrink:0}
.grid-card .gp{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:2/3;background:#1a1a28;cursor:pointer}
.grid-card .gp img{width:100%;height:100%;object-fit:cover;transition:filter .2s}
.fab{position:fixed;bottom:max(env(safe-area-inset-bottom,0px) + 16px, 20px);right:20px;width:48px;height:48px;border-radius:50%;background:#f0c040;border:none;color:#08080f;font-size:24px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(240,192,64,.35);display:flex;align-items:center;justify-content:center;z-index:50}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#101018;border-radius:18px 18px 0 0;width:100%;max-width:500px;padding:20px 18px max(env(safe-area-inset-bottom,0px) + 28px, 28px);max-height:85vh;overflow-y:auto}
.pg-btn{padding:8px 14px;border-radius:6px;border:1px solid #1e1e2a;font-size:12px;cursor:pointer;font-weight:600}
.pg-num{width:30px;height:30px;border-radius:6px;border:none;font-size:11px;cursor:pointer}

const CHOSUNG=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const CHO_LABELS=["ㄱ","ㄴ","ㄷ","ㄹ","ㅁ","ㅂ","ㅅ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ","A-Z"];
const getC=c=>{let k=c.charCodeAt(0);if(k>=0xAC00&&k<=0xD7A3)return CHOSUNG[Math.floor((k-0xAC00)/588)];if((k>=65&&k<=90)||(k>=97&&k<=122))return"A-Z";return null};
const LS=(k,d)=>{try{let v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}};
const SS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}};
const pSt={"Apple TV":{bg:"#122212",c:"#4ade80",b:"#1e3a1e"},"Google TV":{bg:"#121830",c:"#60a5fa",b:"#1e2a4a"},"극장 관람":{bg:"#2a1228",c:"#f472b6",b:"#3e1e38"}};
const PP=20;

function App(){
  const[ud,setUd]=useState(()=>LS("ml-ud",{w:{},r:{},c:[]}));
  const[po,setPo]=useState(()=>LS("ml-po",{}));
  const[ak,setAk]=useState(()=>LS("ml-ak",""));
  const[tk,setTk]=useState(()=>LS("ml-ak",""));
  const[se,setSe]=useState("");const[fp,setFp]=useState("전체");const[fw,setFw]=useState("전체");
  const[fg,setFg]=useState("전체");const[fc,setFc]=useState(null);const[so,setSo]=useState("title");
  const[sa,setSa]=useState(false);const[ss,setSs]=useState(false);const[vw,setVw]=useState("list");
  const[dm,setDm]=useState("list");const[pg,setPg]=useState(1);const[fe,setFe]=useState(false);
  const[pr,setPr]=useState("");const[det,setDet]=useState(null);
  const[nm,setNm]=useState({t:"",e:"",y:"",m:"",g:"",d:""});

  const save=d=>{setUd(d);SS("ml-ud",d)};
  const savePo=d=>{setPo(d);SS("ml-po",d)};
  const all=useMemo(()=>MOVIES.concat(ud.c),[ud.c]);
  const genres=useMemo(()=>{let s={};all.forEach(m=>m.g.split("/").forEach(g=>s[g.trim()]=1));return Object.keys(s).sort()},[all]);

  useEffect(()=>{setPg(1)},[se,fp,fw,fg,fc,so]);

  const fetchAll=async(key)=>{
    if(!key)return;setFe(true);let ca={...po};
    let todo=all.filter(m=>!ca[m.id]);
    for(let i=0;i<todo.length;i++){
      let m=todo[i];setPr(`${i+1}/${todo.length}`);
      try{let r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${key}&query=${encodeURIComponent(m.e)}&year=${m.y}&language=ko-KR`);
      let d=await r.json();if(d.results?.length){let b=d.results[0];for(let j=0;j<d.results.length;j++){let rd=d.results[j].release_date;if(rd&&Math.abs(parseInt(rd)-m.y)<=1){b=d.results[j];break}}if(b.poster_path)ca[m.id]=`https://image.tmdb.org/t/p/w185${b.poster_path}`}}catch(e){}
      if(i%15===14)savePo(ca);await new Promise(r=>setTimeout(r,80));
    }savePo(ca);setFe(false);setPr("")};

  const fetchOne=async(movie)=>{
    if(!ak)return;
    try{let r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${ak}&query=${encodeURIComponent(movie.e)}&year=${movie.y}&language=ko-KR`);
    let d=await r.json();if(d.results?.length){let b=d.results[0];for(let j=0;j<d.results.length;j++){let rd=d.results[j].release_date;if(rd&&Math.abs(parseInt(rd)-movie.y)<=1){b=d.results[j];break}}if(b.poster_path){let u={...po};u[movie.id]=`https://image.tmdb.org/t/p/w185${b.poster_path}`;savePo(u)}}}catch(e){}};

  const toggleW=id=>{let n={...ud,w:{...ud.w,[id]:!ud.w[id]}};save(n)};
  const setR=(id,v)=>{let n={...ud,r:{...ud.r,[id]:v}};save(n)};
  const addM=()=>{if(!nm.t)return;let id="c_"+Date.now();let mv={id,p:"극장 관람",t:nm.t,e:nm.e||nm.t,y:parseInt(nm.y)||0,m:parseInt(nm.m)||0,g:nm.g||"-",d:nm.d||"-",s:"-"};save({...ud,c:[...ud.c,mv]});setNm({t:"",e:"",y:"",m:"",g:"",d:""});setSa(false);fetchOne(mv)};
  const remC=id=>{let nw={...ud.w};delete nw[id];let nr={...ud.r};delete nr[id];save({w:nw,r:nr,c:ud.c.filter(m=>m.id!==id)})};
  const saveKey=()=>{if(!tk)return;setAk(tk);SS("ml-ak",tk);setSs(false);fetchAll(tk)};

  const filtered=useMemo(()=>{
    let l=all;
    if(se){let q=se.toLowerCase();l=l.filter(m=>m.t.toLowerCase().includes(q)||m.e.toLowerCase().includes(q)||m.d.toLowerCase().includes(q)||m.g.toLowerCase().includes(q)||(m.s||"").toLowerCase().includes(q));}
    if(fp!=="전체")l=l.filter(m=>m.p===fp);
    if(fw==="봄")l=l.filter(m=>ud.w[m.id]);if(fw==="안봄")l=l.filter(m=>!ud.w[m.id]);if(fw==="평점")l=l.filter(m=>ud.r[m.id]>0);
    if(fg!=="전체")l=l.filter(m=>m.g.includes(fg));
    if(fc)l=l.filter(m=>{let ch=getC(m.t[0]);return fc==="A-Z"?ch==="A-Z":ch===fc});
    return[...l].sort((a,b)=>{if(so==="title")return a.t.localeCompare(b.t,"ko");if(so==="year")return(b.y||0)-(a.y||0);if(so==="rating")return(ud.r[b.id]||0)-(ud.r[a.id]||0);return 0});
  },[all,se,fp,fw,fg,fc,so,ud]);

  const dirs=useMemo(()=>{let m={};all.forEach(v=>{if(v.d&&v.d!=="-"){if(!m[v.d])m[v.d]=[];m[v.d].push(v)}});return Object.entries(m).filter(e=>e[1].length>=2).sort((a,b)=>b[1].length-a[1].length)},[all]);
  const frs=useMemo(()=>{let m={};all.forEach(v=>{if(v.s&&v.s!=="-"){if(!m[v.s])m[v.s]=[];m[v.s].push(v)}});Object.values(m).forEach(a=>a.sort((x,y)=>(x.y||0)-(y.y||0)));return Object.entries(m).sort((a,b)=>b[1].length-a[1].length)},[all]);
  const st=useMemo(()=>{let wc=Object.values(ud.w).filter(Boolean).length;let rv=Object.values(ud.r).filter(v=>v>0);let avg=rv.length?(rv.reduce((a,b)=>a+b,0)/rv.length).toFixed(1):"-";return{total:all.length,w:wc,rated:rv.length,avg}},[all,ud]);

  const paged=filtered.slice((pg-1)*PP,pg*PP);
  const tp=Math.ceil(filtered.length/PP);

  const Poster=({m,sz=56,ht=84,onTap})=>{
    let w=ud.w[m.id],p=po[m.id];
    return <div className={`poster${w?" w":""}`} onClick={()=>onTap?onTap():toggleW(m.id)} style={{width:sz,minWidth:sz,height:ht}}>
      {p?<img src={p} alt=""/>:<span style={{fontSize:sz>50?20:14,opacity:.3}}>🎬</span>}
      {w&&<div className="ck"><span style={{fontSize:sz>50?22:14,color:"#4ade80"}}>✓</span></div>}
    </div>};

  const Card=({m})=>{
    let rt=ud.r[m.id]||0,ps=pSt[m.p]||pSt["극장 관람"],isC=String(m.id).startsWith("c_");
    return <div className="card">
      <Poster m={m}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
          <span style={{fontSize:14,fontWeight:700,color:ud.w[m.id]?"#777":"#e0e0ec",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{m.t}</span>
          <span className="ptag" style={{background:ps.bg,color:ps.c,border:`1px solid ${ps.b}`}}>{m.p}</span>
          {isC&&<button onClick={()=>remC(m.id)} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:12,padding:0}}>✕</button>}
        </div>
        <div style={{fontSize:10,color:"#555",marginBottom:5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.y||""} · {m.m?m.m+"분":""} · {m.d}</div>
        <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:6}}>{m.g.split("/").map((g,i)=><span key={i} className="tag">{g}</span>)}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div className="stars">{[1,2,3,4,5].map(i=><span key={i} onClick={()=>setR(m.id,rt===i?0:i)} style={{fontSize:15,color:i<=rt?"#f0c040":"#2a2a3a"}}>★</span>)}</div>
          <button className="btn-w" onClick={()=>toggleW(m.id)} style={{background:ud.w[m.id]?"#122212":"#14141e",border:`1px solid ${ud.w[m.id]?"#1e3a1e":"#1e1e2a"}`,color:ud.w[m.id]?"#4ade80":"#444"}}>{ud.w[m.id]?"✓ 봤음":"○ 안봄"}</button>
        </div>
      </div>
    </div>};

  const GCard=({m})=>{let p=po[m.id],w=ud.w[m.id],rt=ud.r[m.id]||0;return <div className="grid-card">
    <div className="gp" onClick={()=>setDet(m)}>{p?<img src={p} alt="" style={{filter:w?"brightness(.35)":"none"}}/>:<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:28,opacity:.2}}>🎬</span></div>}
    {w&&<div style={{position:"absolute",top:4,right:4,background:"rgba(74,222,128,.9)",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:12,color:"#000"}}>✓</span></div>}
    {rt>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,.8))",padding:"12px 6px 4px"}}><div className="stars">{[1,2,3,4,5].map(i=><span key={i} style={{fontSize:10,color:i<=rt?"#f0c040":"#2a2a3a"}}>★</span>)}</div></div>}</div>
    <div style={{fontSize:11,fontWeight:600,color:"#ccc",marginTop:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",padding:"0 2px"}}>{m.t}</div>
    <div style={{fontSize:9,color:"#555",padding:"0 2px"}}>{m.y}</div>
  </div>};

  const Pager=()=>tp>1?<div style={{padding:"8px 14px 90px",display:"flex",justifyContent:"center",alignItems:"center",gap:6}}>
    <button className="pg-btn" onClick={()=>{setPg(Math.max(1,pg-1));scrollTo(0,0)}} disabled={pg<=1} style={{background:pg<=1?"#0d0d14":"#151520",color:pg<=1?"#333":"#ccc"}}>← 이전</button>
    <div style={{display:"flex",gap:3}}>{Array.from({length:tp},(_,i)=>i+1).map(p=>{
      if(tp>7&&p!==1&&p!==tp&&Math.abs(p-pg)>1){if(p===pg-2||p===pg+2)return<span key={p} style={{color:"#444",fontSize:11,padding:"0 2px"}}>···</span>;return null}
      return<button key={p} className="pg-num" onClick={()=>{setPg(p);scrollTo(0,0)}} style={{background:pg===p?"#f0c040":"#151520",color:pg===p?"#08080f":"#666",fontWeight:pg===p?700:400}}>{p}</button>})}</div>
    <button className="pg-btn" onClick={()=>{setPg(Math.min(tp,pg+1));scrollTo(0,0)}} disabled={pg>=tp} style={{background:pg>=tp?"#0d0d14":"#151520",color:pg>=tp?"#333":"#ccc"}}>다음 →</button>
  </div>:<div style={{height:80}}/>;

  const Modal=({show,onClose,children})=>show?<div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose()}}><div className="modal">{children}</div></div>:null;

  return <div>
    <div className="hdr">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:20,fontWeight:900}}>🎬 내 영화 라이브러리</span>
        <button onClick={()=>setSs(true)} style={{background:"none",border:"none",color:"#555",fontSize:18,cursor:"pointer"}}>⚙️</button>
      </div>
      <div style={{display:"flex",gap:14,fontSize:11,color:"#555",marginTop:8}}>
        <span>전체 <b style={{color:"#f0c040"}}>{st.total}</b></span>
        <span>관람 <b style={{color:"#4ade80"}}>{st.w}</b></span>
        <span>평가 <b style={{color:"#60a5fa"}}>{st.rated}</b></span>
        <span>평균 <b style={{color:"#f472b6"}}>{st.avg}</b>★</span>
      </div>
      {fe&&<div style={{fontSize:11,color:"#f0c040",marginTop:6}}>🔄 포스터 불러오는 중... {pr}</div>}
      {!ak&&<div onClick={()=>setSs(true)} style={{fontSize:11,color:"#60a5fa",marginTop:6,cursor:"pointer",textDecoration:"underline"}}>⚙ TMDB API 키 설정 → 포스터 표시</div>}
    </div>

    <div className="tabs">
      {[["list","전체 목록"],["franchise","시리즈별"],["director","감독별"]].map(it=><button key={it[0]} className={vw===it[0]?"on":""} onClick={()=>setVw(it[0])}>{it[1]}</button>)}
    </div>

    {vw==="list"&&<div>
      <div style={{padding:"12px 14px 6px"}}>
        <input value={se} onChange={e=>{setSe(e.target.value);setFc(null)}} placeholder="제목, 감독, 장르 검색 (초성 가능)" style={{width:"100%",padding:"9px 12px",background:"#101018",border:"1px solid #1e1e2a",borderRadius:8,color:"#e0e0ec",fontSize:12,outline:"none"}}/>
        <div style={{display:"flex",gap:4,marginTop:8,overflowX:"auto",paddingBottom:4}}>
          <button className={`chip${fg==="전체"?" on":""}`} onClick={()=>setFg("전체")}>전체</button>
          {genres.map(g=><button key={g} className={`chip${fg===g?" on":""}`} onClick={()=>setFg(g)}>{g}</button>)}
        </div>
        <div style={{display:"flex",gap:3,marginTop:6,overflowX:"auto",paddingBottom:4}}>
          <button className={`cho${!fc?" on":""}`} onClick={()=>{setFc(null);setSe("")}}>ALL</button>
          {CHO_LABELS.map(c=><button key={c} className={`cho${fc===c?" on":""}`} onClick={()=>{setFc(fc===c?null:c);setSe("")}}>{c}</button>)}
        </div>
        <div style={{display:"flex",gap:5,marginTop:6,flexWrap:"wrap",alignItems:"center"}}>
          {["전체","Apple TV","Google TV","극장 관람"].map(p=><button key={p} className={`chip${fp===p?" on":""}`} style={fp===p?{borderColor:"#60a5fa",background:"#101828",color:"#60a5fa"}:{}} onClick={()=>setFp(p)}>{p}</button>)}
          <span style={{marginLeft:"auto"}}/>
          {[["봄","✓"],["안봄","○"],["평점","★"]].map(it=><button key={it[0]} className="chip" style={fw===it[0]?{borderColor:"#f472b6",background:"#1e1020",color:"#f472b6"}:{}} onClick={()=>setFw(fw===it[0]?"전체":it[0])}>{it[1]}</button>)}
        </div>
        <div style={{display:"flex",gap:6,marginTop:6,alignItems:"center"}}>
          <span style={{fontSize:10,color:"#444"}}>정렬:</span>
          {[["title","제목"],["year","최신"],["rating","평점"]].map(it=><button key={it[0]} onClick={()=>setSo(it[0])} style={{padding:"3px 6px",borderRadius:4,border:"none",background:so===it[0]?"#1e1e2a":"transparent",color:so===it[0]?"#ccc":"#444",fontSize:10,cursor:"pointer"}}>{it[1]}</button>)}
          <span style={{marginLeft:"auto"}}/>
          <button onClick={()=>setDm("list")} style={{padding:"3px 7px",borderRadius:4,border:"none",background:dm==="list"?"#1e1e2a":"transparent",color:dm==="list"?"#ccc":"#444",fontSize:12,cursor:"pointer"}}>☰</button>
          <button onClick={()=>setDm("grid")} style={{padding:"3px 7px",borderRadius:4,border:"none",background:dm==="grid"?"#1e1e2a":"transparent",color:dm==="grid"?"#ccc":"#444",fontSize:12,cursor:"pointer"}}>▦</button>
        </div>
      </div>
      <div style={{padding:"0 14px 4px",fontSize:11,color:"#444",display:"flex",justifyContent:"space-between"}}><span>{filtered.length}편</span>{tp>1&&<span style={{color:"#666"}}>{pg}/{tp}페이지</span>}</div>
      {dm==="list"&&<div style={{padding:"0 14px 8px",display:"flex",flexDirection:"column",gap:6}}>{paged.map(m=><Card key={m.id} m={m}/>)}{!filtered.length&&<div style={{textAlign:"center",padding:40,color:"#333"}}>검색 결과가 없습니다</div>}</div>}
      {dm==="grid"&&<div style={{padding:"0 14px 8px",display:"flex",flexWrap:"wrap",gap:8}}>{paged.map(m=><GCard key={m.id} m={m}/>)}{!filtered.length&&<div style={{textAlign:"center",padding:40,color:"#333",width:"100%"}}>검색 결과가 없습니다</div>}</div>}
      <Pager/>
    </div>}

    {vw==="franchise"&&<div style={{padding:"14px 14px 90px"}}>{frs.map(([n,mv])=><div key={n} style={{marginBottom:18}}>
      <div style={{fontSize:13,fontWeight:700,color:"#f0c040",marginBottom:6}}>{n} <span style={{fontSize:10,color:"#555",fontWeight:400}}>{mv.length}편</span></div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>{mv.map(m=><Card key={m.id} m={m}/>)}</div>
    </div>)}</div>}

    {vw==="director"&&<div style={{padding:"14px 14px 90px"}}>{dirs.map(([n,mv])=><div key={n} style={{marginBottom:20}}>
      <div style={{fontSize:13,fontWeight:700,color:"#60a5fa",marginBottom:6}}>🎬 {n} <span style={{fontSize:10,color:"#555",fontWeight:400}}>{mv.length}편</span></div>
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8}}>{mv.sort((a,b)=>(a.y||0)-(b.y||0)).map(m=>{
        let p=po[m.id],w=ud.w[m.id],rt=ud.r[m.id]||0;
        return<div key={m.id} style={{flexShrink:0,width:90}}>
          <div onClick={()=>setDet(m)} style={{position:"relative",borderRadius:6,overflow:"hidden",width:90,height:135,background:"#1a1a28",cursor:"pointer"}}>{p?<img src={p} alt="" style={{width:"100%",height:"100%",objectFit:"cover",filter:w?"brightness(.35)":"none"}}/>:<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:24,opacity:.2}}>🎬</span></div>}{w&&<div style={{position:"absolute",top:3,right:3,background:"rgba(74,222,128,.9)",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:10,color:"#000"}}>✓</span></div>}</div>
          <div style={{fontSize:10,fontWeight:600,color:"#ccc",marginTop:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.t}</div>
          <div style={{fontSize:9,color:"#555"}}>{m.y}</div>
        </div>})}</div>
    </div>)}</div>}

    <button className="fab" onClick={()=>setSa(true)}>+</button>

    <Modal show={det!==null} onClose={()=>setDet(null)}>
      {det&&<div>
        <div style={{display:"flex",gap:14,marginBottom:16}}>
          <Poster m={det} sz={80} ht={120} onTap={()=>toggleW(det.id)}/>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>{det.t}</div>
            <div style={{fontSize:11,color:"#888",marginBottom:2}}>{det.e}</div>
            <div style={{fontSize:11,color:"#555",marginBottom:8}}>{det.y} · {det.m?det.m+"분":""} · {det.d}</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>{det.g.split("/").map((g,i)=><span key={i} className="tag" style={{fontSize:10,padding:"2px 7px"}}>{g}</span>)}</div>
            <div className="stars">{[1,2,3,4,5].map(i=><span key={i} onClick={()=>setR(det.id,ud.r[det.id]===i?0:i)} style={{fontSize:20,color:i<=(ud.r[det.id]||0)?"#f0c040":"#2a2a3a"}}>★</span>)}</div>
          </div>
        </div>
        <button onClick={()=>toggleW(det.id)} style={{width:"100%",padding:10,background:ud.w[det.id]?"#122212":"#14141e",border:`1px solid ${ud.w[det.id]?"#1e3a1e":"#1e1e2a"}`,color:ud.w[det.id]?"#4ade80":"#888",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>{ud.w[det.id]?"✓ 봤음 → 탭하면 취소":"○ 안봄 → 탭하면 봤음 처리"}</button>
      </div>}
    </Modal>

    <Modal show={sa} onClose={()=>setSa(false)}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontSize:15,fontWeight:700}}>🎬 극장 관람 영화 추가</span>
        <button onClick={()=>setSa(false)} style={{background:"none",border:"none",color:"#555",fontSize:18,cursor:"pointer"}}>✕</button>
      </div>
      {[["t","한글 제목 *","영화 제목"],["e","영문 제목","English Title"],["y","개봉년도","2024"],["m","러닝타임(분)","120"],["g","장르","SF/액션"],["d","감독","감독 이름"]].map(f=><div key={f[0]} style={{marginBottom:10}}>
        <label style={{fontSize:10,color:"#555",marginBottom:3,display:"block"}}>{f[1]}</label>
        <input value={nm[f[0]]} onChange={e=>setNm({...nm,[f[0]]:e.target.value})} placeholder={f[2]} style={{width:"100%",padding:"8px 10px",background:"#08080f",border:"1px solid #1e1e2a",borderRadius:6,color:"#e0e0ec",fontSize:12,outline:"none"}}/>
      </div>)}
      <button onClick={addM} disabled={!nm.t} style={{width:"100%",padding:10,background:nm.t?"#f0c040":"#1e1e2a",border:"none",borderRadius:8,color:nm.t?"#08080f":"#444",fontSize:13,fontWeight:700,cursor:nm.t?"pointer":"default",marginTop:6}}>추가하기</button>
    </Modal>

    <Modal show={ss} onClose={()=>setSs(false)}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontSize:15,fontWeight:700}}>⚙️ 설정</span>
        <button onClick={()=>setSs(false)} style={{background:"none",border:"none",color:"#555",fontSize:18,cursor:"pointer"}}>✕</button>
      </div>
      <label style={{fontSize:11,color:"#888",marginBottom:6,display:"block"}}>TMDB API 키 (무료)</label>
      <p style={{fontSize:10,color:"#555",marginBottom:8,lineHeight:1.5}}><a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener noreferrer" style={{color:"#60a5fa"}}>themoviedb.org</a> 가입 후 API 키를 발급받으세요.</p>
      <input value={tk} onChange={e=>setTk(e.target.value)} placeholder="API key" style={{width:"100%",padding:"9px 10px",background:"#08080f",border:"1px solid #1e1e2a",borderRadius:6,color:"#e0e0ec",fontSize:12,outline:"none",fontFamily:"monospace",marginBottom:12}}/>
      <button onClick={saveKey} disabled={!tk} style={{width:"100%",padding:10,background:tk?"#60a5fa":"#1e1e2a",border:"none",borderRadius:8,color:tk?"#08080f":"#444",fontSize:13,fontWeight:700,cursor:tk?"pointer":"default"}}>{ak?"업데이트 & 포스터 불러오기":"저장 & 포스터 불러오기"}</button>
      {ak&&<button onClick={()=>fetchAll(ak)} disabled={fe} style={{width:"100%",padding:10,background:"#1e1e2a",border:"1px solid #2a2a3a",borderRadius:8,color:"#888",fontSize:12,cursor:"pointer",marginTop:8}}>{fe?"불러오는 중... "+pr:"포스터 다시 불러오기"}</button>}
    </Modal>
  </div>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>

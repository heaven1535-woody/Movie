<title>PENSIEVE</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --bg-elev: #16161f; --bg-elev2: #1e1e2a; --bg-input: #0a0a0f;
  --text: #f5f5f7; --text-2: #c0c0cc; --text-3: #888894; --text-4: #555560;
  --border: #2a2a3a; --border-strong: #3a3a4a; --shadow: 0 4px 12px rgba(0,0,0,.4);
  --gold: #f0c040; --gold-2: #e6a800; --green: #4ade80; --blue: #60a5fa; --pink: #f472b6; --purple: #a78bfa;
  --p-apple-bg: rgba(74,222,128,.15); --p-apple-c: #4ade80; --p-apple-b: rgba(74,222,128,.35);
  --p-google-bg: rgba(96,165,250,.15); --p-google-c: #60a5fa; --p-google-b: rgba(96,165,250,.35);
  --p-theater-bg: rgba(244,114,182,.15); --p-theater-c: #f472b6; --p-theater-b: rgba(244,114,182,.35);
  --p-etc-bg: rgba(167,139,250,.15); --p-etc-c: #a78bfa; --p-etc-b: rgba(167,139,250,.35);
  --tag-bg: #1e1e2a; --tag-c: #aaaab8; --tag-b: #2a2a3a;
  --star-empty: #2e2e3a;
  --chip-bg: #16161f; --chip-c: #888894; --chip-bg-on: rgba(240,192,64,.15); --chip-c-on: #f0c040; --chip-b-on: #f0c040;
  --danger: #f87171;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --bg: #f7f7fa; --bg-elev: #ffffff; --bg-elev2: #f0f0f5; --bg-input: #ffffff;
    --text: #1a1a25; --text-2: #404050; --text-3: #707080; --text-4: #9a9aa8;
    --border: #e3e3eb; --border-strong: #c8c8d4; --shadow: 0 2px 8px rgba(0,0,0,.08);
    --gold: #d49000; --gold-2: #b07400; --green: #16a34a; --blue: #2563eb; --pink: #db2777; --purple: #7c3aed;
    --p-apple-bg: #ecfdf5; --p-apple-c: #15803d; --p-apple-b: #86efac;
    --p-google-bg: #eff6ff; --p-google-c: #1d4ed8; --p-google-b: #93c5fd;
    --p-theater-bg: #fdf2f8; --p-theater-c: #be185d; --p-theater-b: #f9a8d4;
    --p-etc-bg: #f5f3ff; --p-etc-c: #6d28d9; --p-etc-b: #c4b5fd;
    --tag-bg: #f0f0f5; --tag-c: #404050; --tag-b: #e3e3eb;
    --star-empty: #d0d0d8;
    --chip-bg: #ffffff; --chip-c: #707080; --chip-bg-on: #fef3c7; --chip-c-on: #b45309; --chip-b-on: #d49000;
    --danger: #dc2626;
  }
}
:root[data-theme="light"] {
  --bg: #f7f7fa; --bg-elev: #ffffff; --bg-elev2: #f0f0f5; --bg-input: #ffffff;
  --text: #1a1a25; --text-2: #404050; --text-3: #707080; --text-4: #9a9aa8;
  --border: #e3e3eb; --border-strong: #c8c8d4; --shadow: 0 2px 8px rgba(0,0,0,.08);
  --gold: #d49000; --gold-2: #b07400; --green: #16a34a; --blue: #2563eb; --pink: #db2777; --purple: #7c3aed;
  --p-apple-bg: #ecfdf5; --p-apple-c: #15803d; --p-apple-b: #86efac;
  --p-google-bg: #eff6ff; --p-google-c: #1d4ed8; --p-google-b: #93c5fd;
  --p-theater-bg: #fdf2f8; --p-theater-c: #be185d; --p-theater-b: #f9a8d4;
  --p-etc-bg: #f5f3ff; --p-etc-c: #6d28d9; --p-etc-b: #c4b5fd;
  --tag-bg: #f0f0f5; --tag-c: #404050; --tag-b: #e3e3eb;
  --star-empty: #d0d0d8;
  --chip-bg: #ffffff; --chip-c: #707080; --chip-bg-on: #fef3c7; --chip-c-on: #b45309; --chip-b-on: #d49000;
  --danger: #dc2626;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { background:var(--bg); }
body {
  color:var(--text); font-family:'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing:antialiased; padding-bottom:env(safe-area-inset-bottom);
  font-size:15px; line-height:1.5; transition:background-color .2s ease;
}
input, textarea, button { -webkit-appearance:none; appearance:none; font-family:inherit; }
::-webkit-scrollbar { display:none; }
a { color:var(--blue); text-decoration:none; }

.c-gold { color:var(--gold); } .c-green { color:var(--green); } .c-blue { color:var(--blue); } .c-pink { color:var(--pink); } .c-purple { color:var(--purple); }

/* HEADER */
.hdr { padding: max(env(safe-area-inset-top), 20px) 20px 16px; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:0; z-index:10; }
.hdr-row { display:flex; justify-content:space-between; align-items:center; }
.hdr-actions { display:flex; gap:4px; }
.brand {
  font-family:'Cormorant Garamond', serif; font-size:30px; font-weight:700;
  letter-spacing:0.18em; display:flex; align-items:center; gap:10px;
  background:linear-gradient(135deg, var(--gold), var(--gold-2));
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}
.brand-mark { font-size:24px; -webkit-text-fill-color:var(--gold); filter:drop-shadow(0 2px 4px rgba(240,192,64,.3)); }
.brand-sub { font-size:11px; color:var(--text-4); letter-spacing:0.04em; margin-top:2px; font-weight:500; }.brand-sub::after { content:" · v2.1.0"; color:var(--text-4); opacity:0.7; margin-left:2px; font-family:"SF Mono", Menlo, monospace; font-size:10px; }
.icon-btn { background:none; border:none; color:var(--text-3); font-size:20px; cursor:pointer; padding:6px 8px; border-radius:8px; transition:background .15s; }
.icon-btn:hover { background:var(--bg-elev2); }
.stats-row { display:flex; gap:16px; font-size:13px; color:var(--text-3); margin-top:12px; flex-wrap:wrap; align-items:center; }
.stats-row b { font-weight:700; font-size:14px; }
.rewatch-hint { color:var(--text-4); font-size:11px; margin-left:3px; }
.hdr-notice { font-size:12px; color:var(--gold); margin-top:8px; padding:6px 10px; background:var(--bg-elev2); border-radius:6px; }
.hdr-link { font-size:12px; color:var(--blue); margin-top:8px; cursor:pointer; text-decoration:underline; }
.hdr-link.backup-hint { color:var(--gold); }

/* WELCOME */
.welcome { padding:60px 28px; text-align:center; max-width:420px; margin:0 auto; }
.welcome-icon { font-size:64px; color:var(--gold); margin-bottom:20px; filter:drop-shadow(0 4px 12px rgba(240,192,64,.35)); }
.welcome-title { font-family:'Cormorant Garamond', serif; font-size:24px; font-weight:700; letter-spacing:0.04em; margin-bottom:14px; color:var(--text); }
.welcome-text { font-size:14px; color:var(--text-3); line-height:1.7; margin-bottom:32px; }
.welcome-btn {
  width:100%; padding:15px;
  background:linear-gradient(135deg, var(--gold), var(--gold-2)); border:none;
  border-radius:12px; color:#fff; font-size:15px; font-weight:700;
  cursor:pointer; margin-bottom:10px; letter-spacing:-0.01em;
  box-shadow:0 4px 14px rgba(240,192,64,.3); transition:transform .1s;
}
.welcome-btn:active { transform:scale(.98); }
.welcome-btn.secondary { background:var(--bg-elev); color:var(--text); border:1.5px solid var(--border); box-shadow:none; }
.welcome-hint { font-size:12px; color:var(--text-4); margin-top:24px; line-height:1.6; }

/* TABS */
.tabs { display:flex; border-bottom:1px solid var(--border); background:var(--bg); }
.tabs button { flex:1; padding:13px 0; background:none; border:none; border-bottom:2.5px solid transparent; color:var(--text-3); font-size:14px; font-weight:600; cursor:pointer; transition:all .15s; }
.tabs button.on { background:var(--bg-elev2); border-bottom-color:var(--gold); color:var(--gold); }

/* FILTERS */
.filters { padding:14px 16px 8px; }
.search-wrap { position:relative; }
.search-input { width:100%; padding:12px 38px 12px 14px; background:var(--bg-elev); border:1.5px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; outline:none; transition:border-color .15s; }
.search-input:focus { border-color:var(--gold); }
.search-input::placeholder { color:var(--text-4); }
.search-clear { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:var(--bg-elev2); border:none; color:var(--text-3); width:24px; height:24px; border-radius:50%; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; }

.chip-row, .cho-row, .filter-row, .sort-row { display:flex; gap:6px; margin-top:10px; overflow-x:auto; padding-bottom:4px; }
.filter-row { flex-wrap:wrap; align-items:center; }
.sort-row { align-items:center; flex-wrap:wrap; overflow-x:visible; row-gap:6px; }

.chip { padding:6px 13px; border-radius:18px; border:1.5px solid var(--border); background:var(--chip-bg); color:var(--chip-c); font-size:12px; cursor:pointer; font-weight:600; white-space:nowrap; flex-shrink:0; transition:all .15s; }
.chip.on { border-color:var(--chip-b-on); background:var(--chip-bg-on); color:var(--chip-c-on); }
.chip.decade.on { border-color:var(--green); background:rgba(74,222,128,.12); color:var(--green); }
.chip.platform.on { border-color:var(--blue); color:var(--blue); background:rgba(96,165,250,.12); }
.chip.watch.on { border-color:var(--pink); color:var(--pink); background:rgba(244,114,182,.12); }

.cho { padding:5px 9px; border-radius:6px; border:none; background:transparent; color:var(--text-3); font-size:13px; font-weight:600; cursor:pointer; flex-shrink:0; min-width:30px; }
.cho.on { background:var(--gold); color:#fff; font-weight:700; }

.sort-label { font-size:12px; color:var(--text-4); }
.sort-btn { padding:7px 13px; border-radius:16px; border:1.5px solid var(--border); background:var(--chip-bg); color:var(--text-3); font-size:12px; cursor:pointer; font-weight:600; white-space:nowrap; transition:all .15s; }
.sort-btn.on { background:var(--chip-bg-on); border-color:var(--chip-b-on); color:var(--chip-c-on); }
.view-btn { padding:5px 10px; border-radius:6px; border:none; background:transparent; color:var(--text-4); font-size:16px; cursor:pointer; }
.view-btn.on { background:var(--bg-elev2); color:var(--text); }

.result-count { padding:8px 16px 10px; font-size:13px; color:var(--text-3); display:flex; justify-content:space-between; }
.page-info { color:var(--text-4); }

/* LIST CARDS */
.list-view { padding:0 16px 8px; display:flex; flex-direction:column; gap:10px; }
.card { background:var(--bg-elev); border-radius:12px; padding:14px; border:1px solid var(--border); display:flex; gap:14px; box-shadow:var(--shadow); transition:all .15s; }
.card.watched { opacity:.75; }
.card-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:6px; }
.card-title-row { display:flex; align-items:center; gap:8px; cursor:pointer; }
.card-title { font-size:15px; font-weight:700; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; letter-spacing:-0.01em; }
.card.watched .card-title { color:var(--text-3); }
.note-icon { font-size:14px; }
.card-meta { font-size:12px; color:var(--text-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; }
.card-genres { display:flex; gap:5px; flex-wrap:wrap; }
.card-actions { display:flex; justify-content:space-between; align-items:center; margin-top:4px; gap:8px; }

.ptag { font-size:11px; padding:3px 8px; border-radius:5px; font-weight:700; white-space:nowrap; flex-shrink:0; letter-spacing:0.02em; }
.ptag.p-Apple-TV, .platform-btn.p-Apple-TV.on { background:var(--p-apple-bg); color:var(--p-apple-c); border:1px solid var(--p-apple-b); }
.ptag.p-Google-TV, .platform-btn.p-Google-TV.on { background:var(--p-google-bg); color:var(--p-google-c); border:1px solid var(--p-google-b); }
.ptag.p-극장-관람, .platform-btn.p-극장-관람.on { background:var(--p-theater-bg); color:var(--p-theater-c); border:1px solid var(--p-theater-b); }
.ptag.p-기타, .platform-btn.p-기타.on { background:var(--p-etc-bg); color:var(--p-etc-c); border:1px solid var(--p-etc-b); }

.tag { font-size:11px; padding:3px 8px; border-radius:5px; background:var(--tag-bg); color:var(--tag-c); border:1px solid var(--tag-b); font-weight:500; }
.tag.lg { font-size:12px; padding:4px 10px; }

.stars { display:flex; gap:2px; }
.stars .star { font-size:18px; color:var(--star-empty); cursor:pointer; user-select:none; transition:color .15s; }
.stars .star.on { color:var(--gold); }
.stars .star.sm { font-size:12px; }
.stars.lg .star { font-size:24px; }

.watch-btn { border-radius:7px; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer; background:var(--bg-elev2); color:var(--text-3); border:1.5px solid var(--border); transition:all .15s; white-space:nowrap; }
.watch-btn.on { background:var(--p-apple-bg); color:var(--p-apple-c); border-color:var(--p-apple-b); }

/* POSTER */
.poster { border-radius:8px; overflow:hidden; background:var(--bg-elev2); display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; flex-shrink:0; box-shadow:var(--shadow); }
.poster img { width:100%; height:100%; object-fit:cover; transition:filter .2s; }
.poster:not(.w) img { filter:brightness(.4); }
.poster .ck { display:none; }
.poster .ck span { font-size:28px; color:var(--green); font-weight:900; }
.poster-ph { font-size:24px; opacity:.3; }
.poster-ph-grid { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:var(--bg-elev2); }
.poster-ph-grid span { font-size:32px; opacity:.25; }

/* GRID */
.grid-view { padding:0 16px 8px; display:flex; flex-wrap:wrap; gap:10px; }
.grid-card { width:calc(33.33% - 7px); flex-shrink:0; }
.gp { position:relative; border-radius:10px; overflow:hidden; aspect-ratio:2/3; background:var(--bg-elev2); cursor:pointer; box-shadow:var(--shadow); }
.gp img { width:100%; height:100%; object-fit:cover; transition:filter .2s; }
.gp img:not(.dim) { filter:brightness(.4); }
.grid-watched { display:none; }
.grid-watched.sm { width:18px; height:18px; top:4px; right:4px; }
.grid-watched span { font-size:14px; color:#fff; font-weight:900; }
.grid-watched.sm span { font-size:11px; }
.grid-note { position:absolute; top:6px; left:6px; background:var(--gold); border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,.3); }
.grid-note span { font-size:12px; }
.grid-rating { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent, rgba(0,0,0,.85)); padding:18px 8px 6px; }
.grid-title { font-size:13px; font-weight:700; color:var(--text); margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 2px; }
.grid-year { font-size:11px; color:var(--text-3); padding:0 2px; }

/* SECTIONS */
.section-view { padding:16px 16px 90px; }
.section { margin-bottom:24px; }
.section-title { font-size:15px; font-weight:700; margin-bottom:10px; letter-spacing:-0.01em; }
.section-count { font-size:12px; color:var(--text-4); font-weight:500; margin-left:6px; }
.section-list { display:flex; flex-direction:column; gap:10px; }
.director-scroll { display:flex; gap:10px; overflow-x:auto; padding-bottom:10px; -webkit-overflow-scrolling:touch; }
.director-item { flex-shrink:0; width:100px; }
.director-poster { position:relative; border-radius:8px; overflow:hidden; width:100px; height:150px; background:var(--bg-elev2); cursor:pointer; box-shadow:var(--shadow); }
.director-poster img { width:100%; height:100%; object-fit:cover; }
.director-poster img:not(.dim) { filter:brightness(.4); }
.director-title { font-size:12px; font-weight:700; color:var(--text); margin-top:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.director-year { font-size:11px; color:var(--text-3); }

/* STATS */
.stats-view { padding:16px 16px 90px; }
.stat-cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:22px; }
.stat-card { padding:14px; background:var(--bg-elev); border-radius:12px; border:1px solid var(--border); box-shadow:var(--shadow); }
.stat-label { font-size:12px; color:var(--text-3); margin-bottom:6px; }
.stat-value { font-size:22px; font-weight:900; letter-spacing:-0.02em; }
.stat-sub { font-size:12px; color:var(--text-4); margin-left:4px; font-weight:500; }

.stat-section { margin-bottom:24px; }
.stat-section-title { font-size:15px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; }
.empty-sm { font-size:13px; color:var(--text-4); }

.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:7px; }
.bar-label { font-size:13px; color:var(--text-2); width:88px; min-width:88px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bar-track { flex:1; height:22px; background:var(--bg-elev2); border-radius:6px; overflow:hidden; position:relative; }
.bar-fill { height:100%; border-radius:6px; transition:width .4s; }
.bar-count { position:absolute; right:8px; top:0; font-size:12px; font-weight:700; color:var(--text); line-height:22px; }

/* MONTHLY CHART */
.monthly-chart { display:flex; gap:4px; height:100px; align-items:flex-end; padding:8px 4px; background:var(--bg-elev); border-radius:10px; border:1px solid var(--border); }
.month-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; min-width:0; }
.month-bar-track { width:100%; flex:1; display:flex; align-items:flex-end; justify-content:center; position:relative; }
.month-bar-fill { width:80%; min-height:2px; border-radius:3px 3px 0 0; transition:height .4s; position:relative; }
.month-count { position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:10px; color:var(--blue); font-weight:700; }
.month-label { font-size:9px; color:var(--text-4); white-space:nowrap; }

.top5-scroll { display:flex; gap:10px; overflow-x:auto; padding-bottom:10px; }
.top5-item { flex-shrink:0; width:90px; }
.top5-poster { border-radius:8px; overflow:hidden; width:90px; height:135px; background:var(--bg-elev2); cursor:pointer; box-shadow:var(--shadow); }
.top5-poster img { width:100%; height:100%; object-fit:cover; }
.top5-title { font-size:11px; font-weight:600; color:var(--text); margin-top:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* FAB */
.fab {
  position:fixed; bottom:max(calc(env(safe-area-inset-bottom, 0px) + 20px), 24px); right:24px;
  width:56px; height:56px; border-radius:50%;
  background:linear-gradient(135deg, var(--gold), var(--gold-2));
  border:none; color:#fff; font-size:28px; font-weight:300; cursor:pointer;
  box-shadow:0 6px 20px rgba(240,192,64,.45);
  display:flex; align-items:center; justify-content:center;
  z-index:50; transition:transform .15s;
}
.fab:active { transform:scale(.92); }

/* MODAL */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; display:flex; align-items:flex-end; justify-content:center; backdrop-filter:blur(4px); }
.modal { background:var(--bg-elev); border-radius:20px 20px 0 0; width:100%; max-width:500px; padding:22px 20px max(calc(env(safe-area-inset-bottom, 0px) + 32px), 32px); max-height:88vh; overflow-y:auto; box-shadow:0 -10px 40px rgba(0,0,0,.2); }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.modal-title { font-size:17px; font-weight:700; letter-spacing:-0.01em; }
.modal-close { background:none; border:none; color:var(--text-3); font-size:22px; cursor:pointer; padding:4px 8px; }

/* DETAIL */
.detail-header { display:flex; gap:16px; margin-bottom:18px; }
.detail-info { flex:1; }
.detail-title { font-size:18px; font-weight:800; margin-bottom:5px; letter-spacing:-0.02em; }
.detail-en { font-size:13px; color:var(--text-3); margin-bottom:3px; }
.detail-meta { font-size:13px; color:var(--text-3); margin-bottom:10px; }
.detail-genres { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:12px; }

.watch-section { background:var(--bg-elev2); border-radius:12px; padding:14px; margin-bottom:18px; border:1px solid var(--border); }
.watch-section-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.watch-count { font-size:11px; color:var(--text-4); margin-left:6px; font-weight:500; }
.rewatch-btn { padding:6px 12px; border-radius:8px; border:1.5px solid var(--border); background:var(--bg-elev); color:var(--text-2); font-size:12px; font-weight:700; cursor:pointer; }
.rewatch-btn.primary { background:linear-gradient(135deg, var(--gold), var(--gold-2)); color:#fff; border:none; }
.watch-list { display:flex; flex-direction:column; gap:4px; }
.watch-entry { display:flex; justify-content:space-between; align-items:center; padding:6px 10px; background:var(--bg-elev); border-radius:6px; }
.watch-date { font-size:13px; color:var(--text); font-weight:500; }
.watch-del { background:none; border:none; color:var(--text-4); cursor:pointer; font-size:13px; padding:2px 6px; }

.detail-actions { display:flex; gap:8px; margin-top:14px; margin-bottom:10px; }
.detail-edit-btn, .detail-del-btn { flex:1; padding:11px; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; border:1.5px solid var(--border); background:var(--bg-elev2); transition:all .15s; }
.detail-edit-btn { color:var(--blue); }
.detail-del-btn { color:var(--danger); }

/* FORM */
.form-field { margin-bottom:14px; }
.form-label { font-size:13px; color:var(--text-2); font-weight:600; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }

.form-input { width:100%; padding:11px 13px; background:var(--bg-input); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border-color .15s; }
.form-input:focus { border-color:var(--gold); }
.form-input.mono { font-family:'SF Mono', Menlo, monospace; font-size:13px; }
.memo-area { width:100%; padding:13px; background:var(--bg-input); border:1.5px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; outline:none; resize:vertical; font-family:inherit; line-height:1.6; margin-bottom:12px; transition:border-color .15s; }
.memo-area:focus { border-color:var(--gold); }
.memo-area::placeholder { color:var(--text-4); }

.autocomplete-wrap { position:relative; }
.autocomplete-loading { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:11px; color:var(--text-4); }
.autocomplete-list { margin-top:4px; background:var(--bg-elev); border:1.5px solid var(--gold); border-radius:8px; overflow:hidden; max-height:300px; overflow-y:auto; box-shadow:var(--shadow); }
.autocomplete-item { display:flex; gap:10px; padding:8px; cursor:pointer; border-bottom:1px solid var(--border); transition:background .12s; }
.autocomplete-item:last-child { border-bottom:none; }
.autocomplete-item:hover { background:var(--bg-elev2); }
.ac-poster { width:44px; height:66px; object-fit:cover; border-radius:4px; flex-shrink:0; background:var(--bg-elev2); }
.ac-poster-ph { width:44px; height:66px; background:var(--bg-elev2); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; opacity:.4; }
.ac-info { flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center; }
.ac-title { font-size:14px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ac-sub { font-size:11px; color:var(--text-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }

.platform-picker { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.platform-btn { padding:10px 8px; border-radius:8px; background:var(--bg-elev2); border:1.5px solid var(--border); color:var(--text-3); font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }

.preview-poster { width:120px; height:180px; object-fit:cover; border-radius:8px; box-shadow:var(--shadow); }

.primary-btn { width:100%; padding:14px; background:linear-gradient(135deg, var(--gold), var(--gold-2)); border:none; border-radius:10px; color:#fff; font-size:15px; font-weight:700; cursor:pointer; letter-spacing:-0.01em; transition:transform .1s; }
.primary-btn:active { transform:scale(.98); }
.primary-btn:disabled { background:var(--bg-elev2); color:var(--text-4); cursor:default; }

.settings-section { padding:16px; background:var(--bg-elev2); border-radius:12px; border:1px solid var(--border); margin-bottom:14px; }
.settings-section-title { font-size:14px; font-weight:700; margin-bottom:10px; }
.settings-help { font-size:12px; color:var(--text-3); margin-bottom:12px; line-height:1.6; }
.settings-help a { color:var(--blue); }
.theme-buttons { display:flex; gap:8px; }
.theme-btn { flex:1; padding:11px 8px; border-radius:8px; background:var(--bg-elev); border:1.5px solid var(--border); color:var(--text-2); font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }
.theme-btn.on { background:var(--chip-bg-on); border-color:var(--gold); color:var(--chip-c-on); }

.export-btn, .import-btn, .api-btn, .api-refetch-btn { width:100%; padding:13px; border-radius:9px; font-size:14px; font-weight:700; cursor:pointer; transition:transform .1s; }
.export-btn { background:var(--green); border:none; color:#fff; margin-bottom:8px; }
.import-btn { background:var(--bg-elev); border:1.5px solid var(--border); color:var(--text); }
.api-btn { background:var(--blue); border:none; color:#fff; }

.api-refetch-btn { background:var(--bg-elev); border:1.5px solid var(--border); color:var(--text-2); margin-top:8px; }

.pager { padding:14px 16px 90px; display:flex; justify-content:center; align-items:center; gap:8px; }
.pg-btn { padding:10px 16px; border-radius:8px; border:1.5px solid var(--border); background:var(--bg-elev); color:var(--text-2); font-size:13px; cursor:pointer; font-weight:700; }
.pg-btn:disabled { background:var(--bg-elev2); color:var(--text-4); cursor:default; }
.pg-nums { display:flex; gap:4px; }
.pg-num { width:34px; height:34px; border-radius:8px; border:none; background:var(--bg-elev); color:var(--text-2); font-size:13px; font-weight:600; cursor:pointer; }
.pg-num.on { background:var(--gold); color:#fff; font-weight:800; }
.pg-dots { color:var(--text-4); font-size:13px; padding:0 4px; align-self:center; }

.empty { text-align:center; padding:60px 20px; color:var(--text-4); font-size:14px; }
